title: "Monday — Lower Body"
subtitle: "Focus: legs + stability"
exercises:
  - id: "box-jumps"
    name: "Box / Vertical Jumps"
    tracked: false
    description: "Stand tall, dip slightly, jump as high as possible. Land softly with bent knees."
    cue: "Jump fast, land quiet."
    youtube: "https://i.giphy.com/glD2SrkFrTJ3FUyyGB.webp"
  - id: "back-squat"
    name: "Back Squat"
    tracked: true
    description: "Bar on upper back, sit down between your hips, stand back up under control. 5 rep lower, 3 rep mid, then 1 rep topset. Don't forget a backoff set 3 reps that's 82% of topset that day."
    cue: "Sit between my hips and stand tall."
    youtube: "https://i0.wp.com/www.strengthlog.com/wp-content/uploads/2020/10/Pause-squat.gif?resize=600%2C600&ssl=1"
  - id: "bulgarian-split-squat"
    name: "Bulgarian Split Squat"
    tracked: true
    description: "One foot behind you on a bench, squat down on the front leg."
    cue: "Front leg works, back leg just helps."
    youtube: "https://i0.wp.com/www.strengthlog.com/wp-content/uploads/2023/02/Bulgarian-split-squat-barbell.gif?fit=600%2C600&ssl=1"
  - id: "tibialis-raises"
    name: "Tibialis Raises"
    tracked: false
    description: "Lean against wall or use tib bar, lift toes toward shins."
    cue: ""
    youtube: "https://gymvisual.com/img/p/3/6/0/7/1/36071.gif"
  - id: "bent-knee-calf-raises"
    name: "Bent-Knee Calf Raises"
    tracked: true
    description: "Rise onto balls of feet with knees bent."
    cue: ""
    youtube: "https://gymvisual.com/img/p/3/6/5/3/0/36530.gif"
