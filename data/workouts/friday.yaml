title: "Friday — Upper Back, Hips & Armor"
subtitle: "Focus: posture, glutes"
exercises:
  - id: "bench-supported-row"
    name: "Bench-Supported Row"
    tracked: true
    description: "Chest on bench, pull weight toward ribs."
    cue: "Pull elbows to ribs."
    youtube: "https://www.youtube.com/watch?v=roCP6wCXPqo"
  - id: "wall-slides"
    name: "Wall Slides"
    tracked: false
    description: "Stand with your back flat against a wall, arms in a goalpost position. Slowly slide your arms up overhead and back down while keeping contact with the wall."
    cue: "Keep arms and back glued to the wall."
    youtube: ""
  - id: "barbell-wrist-curls"
    name: "Barbell Wrist Curls"
    tracked: true
    description: "Rest your forearms on a bench with wrists hanging off the edge, curl a barbell up using only your wrists."
    cue: "Slow and controlled, squeeze at the top."
    youtube: ""
  - id: "romanian-dead-lift"
    name: "Romanian Dead Lift"
    tracked: false
    description: "Hold a barbell at hip height, hinge at the hips and lower the bar along your legs while keeping a slight knee bend and flat back."
    cue: "Push hips back, bar stays close to legs."
    youtube: ""
  - id: "push-ups-plus"
    name: "Push Ups Plus"
    tracked: false
    description: "Perform a standard push-up, then at the top push further by protracting your shoulder blades to round your upper back slightly."
    cue: "Push the floor away, spread shoulder blades at the top."
    youtube: ""
  - id: "barbell-hip-thrust"
    name: "Barbell Hip Thrust"
    tracked: true
    description: "Upper back on bench, drive hips upward and squeeze glutes."
    cue: "Drive hips up, squeeze, don't arch."
    youtube: "https://www.youtube.com/shorts/_i6qpcI1Nw4"
