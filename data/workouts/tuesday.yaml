title: "Tuesday — Upper Body + Neck & Grip"
subtitle: "Focus: push, pull, posture"
exercises:
  - id: "medicine-ball-chest-throws"
    name: "Medicine Ball Chest Throws"
    tracked: true
    description: "Hold ball at chest, explosively throw straight forward into a wall."
    cue: ""
    youtube: "https://gymvisual.com/img/p/2/4/5/0/7/24507.gif"
  - id: "incline-bench-press"
    name: "Incline Bench Press"
    tracked: true
    description: "Press bar or dumbbells upward while lying on an inclined bench."
    cue: "Lower slow, press smooth."
    youtube: "https://i0.wp.com/www.strengthlog.com/wp-content/uploads/2020/03/Incline-Bench-Press.gif?fit=600%2C600&ssl=1"
  - id: "wall-slides"
    name: "Wall Slides"
    tracked: false
    description: "Stand with your back flat against a wall, arms in a goalpost position. Slowly slide your arms up overhead and back down while keeping contact with the wall."
    cue: "Keep arms and back glued to the wall."
    youtube: "https://media.post.rvohealth.io/wp-content/uploads/2021/05/GRT-1.7.Wall-Angels.gif"
  - id: "face-pulls"
    name: "Face Pulls"
    tracked: true
    description: "Pull cable or band toward face with elbows high."
    cue: ""
    youtube: "https://www.powrpersonaltraining.com/wp-content/uploads/2025/09/Cable-Face-Pull-Exercise-Demo.gif"
  - id: "lat-pulldowns"
    name: "Lat Pulldowns"
    tracked: true
    description: "Grip a wide bar on a cable machine, pull it down to your upper chest while squeezing your shoulder blades together."
    cue: "Pull elbows down and back, chest up."
    youtube: "https://legionathletics.com/wp-content/uploads/2025/01/Lat-Pulldown-gif.gif"
  - id: "towel-hang"
    name: "Towel Hang"
    tracked: false
    description: "Towel looped on bar, grab and squeeze, barely hang. 10-20s, 2-3 rounds."
    cue: ""
    youtube: "https://i.makeagif.com/media/9-26-2016/eY6o-9.gif"
  - id: "barbell-wrist-curls"
    name: "Barbell Wrist Curls"
    tracked: true
    description: "Rest your forearms on a bench with wrists hanging off the edge, curl a barbell up using only your wrists."
    cue: "Slow and controlled, squeeze at the top."
    youtube: "https://newlife.com.cy/wp-content/uploads/2019/11/01251301-Barbell-Wrist-Curl-II_Forearms_360.gif"
