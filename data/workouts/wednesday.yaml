    name: "Dead Bug"
    tracked: false
    description: "Lie on your back with arms extended toward the ceiling and knees bent at 90 degrees. Slowly lower the opposite arm and leg toward the floor while keeping your lower back pressed into the ground."
    cue: "Keep lower back flat on the floor."
    youtube: "https://hw.qld.gov.au/wp-content/uploads/2015/07/29_M_WIP02.gif"
  - id: "planks"
    name: "Planks"
    tracked: false
    description: "Hold plank."
    cue: ""
    youtube: "https://i.makeagif.com/media/12-10-2020/loK6lL.gif"
  - id: "strap-traction"
    name: "Strap Traction / Hanging"
    tracked: false
    description: "Light bodyweight traction to unload spine. No swinging."
    cue: ""
    youtube: "https://media.tenor.com/K-UZrgp-1vQAAAAM/scapular-pulls.gif"
