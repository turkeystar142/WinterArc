title: "Wednesday — Power, Core & Recovery"
subtitle: "Low fatigue"
exercises:
  - id: "pogos"
    name: "Pogos (Ankle Hops)"
    tracked: false
    description: "Small, quick jumps using mostly ankles. Think \"springy,\" not high."
    cue: ""
    youtube: "https://i.makeagif.com/media/6-25-2021/fzEoeU.gif"
  - id: "box-jumps"
    name: "Box / Vertical Jumps"
    tracked: false
    description: "Jump explosively with controlled landings."
    cue: "Jump fast, land quiet."
    youtube: "https://i.giphy.com/glD2SrkFrTJ3FUyyGB.webp"
  - id: "dumbbell-jump-shrugs"
    name: "Dumbbell Jump Shrugs"
    tracked: true
    description: "Light dumbbell, jump fast while shrugging shoulders."
    cue: ""
    youtube: "https://assets.myworkouts.io/exercises-media/cDmJojFRjgRZ9GMup/dumbbell_shrug_female_v8_gif100px_capon.gif"
  - id: "rotational-med-ball-throws"
    name: "Rotational Medicine Ball Throws"
    tracked: true
    description: "From a kneeling position, rotate torso and throw sideways."
    cue: ""
    youtube: "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExOWY1YjlubDB5NGp4bTdycmkwcXc2ZmV6MG1zdHVwNHpyNXU3MTJnMiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/LyLpxw8SBKhPR1lp1P/giphy.gif"
